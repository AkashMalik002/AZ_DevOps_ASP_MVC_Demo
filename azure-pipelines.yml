# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

#Deploying to staging in Azure app
trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =============================
# BUILD
# =============================
- stage: Build
  displayName: Build Application

  jobs:
  - job: BuildJob

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '9.x'

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: restore
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: '--configuration Release'

    - task: DotNetCoreCLI@2
      displayName: Publish
      inputs:
        command: publish
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop



# =============================
# QA DEPLOYMENT
# =============================
- stage: DeployQA

  displayName: Deploy to QA

  dependsOn: Build

  jobs:

  - deployment: QADeploy

    environment: QA

    strategy:
      runOnce:

        deploy:

          steps:

          - download: current
            artifact: drop

          - task: AzureWebApp@1

            inputs:

              azureSubscription: 'Azure-ServiceConnection'
              appType: 'webApp'
              appName: 'azuredevopappakash'

              deployToSlotOrASE: true

              resourceGroupName: 'VisualStudioOnline-000D36FE59E949D7A0C0F01F40CCCACF'

              slotName: 'staging-qa'

              package: '$(Pipeline.Workspace)/drop/**/*.zip'